name: Update card database

on:
  schedule:
    # Sundays at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild public/cards.json from upstream
        run: node scripts/build-cards.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/cards.json; then
            echo "No changes to card database."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/cards.json
          git commit -m "chore: sync card database from the-fab-cube/flesh-and-blood-cards"
          git push
